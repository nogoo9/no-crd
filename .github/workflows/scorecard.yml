name: Scorecard security analysis
on:
  # Only the default branch is supported
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 6" # Weekly on Saturdays

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload results to the Security tab
      security-events: write
      # Required to publish results and get a badge
      id-token: write
      # Required to check out code
      contents: read
      # Required to read actions history for analysis
      actions: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35484ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Public repositories can publish results to OpenSSF Scorecards API
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@9e8d0769d2a3fa18f50d8b335c05c613e515d97f # v3.28.6
        with:
          sarif_file: results.sarif
